databases:
  - name: reading-hub-db
    plan: free
    databaseName: readinghub
    user: readinghub

services:
  # ── Backend API ──────────────────────────────────────────────
  - type: web
    name: reading-hub-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: reading-hub-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: UPLOADS_DIR
        value: ./uploads

  # ── Frontend (Next.js) ───────────────────────────────────────
  - type: web
    name: reading-hub-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: INTERNAL_API_URL
        sync: false
